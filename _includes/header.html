<aside class="logo">

	{% if page.url == '/index.html' or page.url == '/' %}
		{% assign prompt = 'Home' %}
	{% else %}
		{% assign prompt = 'Back to Home' %}
	{% endif %}

	<a href="{{ '/' | prepend: site.baseurl | prepend: site.url }}">
		<img src="{{ site.logo_url }}" alt="" class="logo-avatar">
	</a>
	<span class="logo-prompt code">{{ prompt }}</span>

</aside>
